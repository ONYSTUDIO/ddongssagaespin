<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>똥싸개 슬롯머신</title>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="loginScreen" class="login-screen" role="dialog" aria-modal="true" aria-label="로그인">
    <div class="login-popup">
      <!-- 팝업 배경 프레임 (1024×1536 캔버스) -->
      <img id="loginPopupBg" class="login-popup-bg-img" src="" alt="">

      <!-- 콘텐츠: 프레임 내부 영역 -->
      <div class="login-popup-content">
        <h2 class="login-title">로그인하고 운세를 확인하세요</h2>

        <!-- 아이디 입력창 -->
        <div class="login-input-wrap">
          <img class="login-input-bg-img" src="" alt="">
          <span class="login-icon login-icon-user" aria-hidden="true"></span>
          <input
            type="text"
            id="loginId"
            class="login-input"
            placeholder="아이디를 입력하세요"
            autocomplete="username"
          >
        </div>

        <!-- 비밀번호 입력창 -->
        <div class="login-input-wrap">
          <img class="login-input-bg-img" src="" alt="">
          <span class="login-icon login-icon-lock" aria-hidden="true"></span>
          <input
            type="password"
            id="loginPw"
            class="login-input"
            placeholder="비밀번호를 입력하세요"
            autocomplete="current-password"
          >
        </div>

        <!-- 로그인 버튼 (1024×1536 캔버스, y≈50% 위치) -->
        <div class="login-btn-wrap">
          <img id="loginBtnImg" class="login-btn-img" src="" alt="로그인">
          <button class="login-btn" id="loginBtn" type="button" aria-label="로그인"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 전체 게임 컨테이너 -->
  <div class="container">

    <!-- 타이틀 -->
    <h1 class="title">🎰 똥싸개 슬롯머신</h1>

    <!-- 슬롯 머신 본체 -->
    <div class="machine">

      <!-- 머신 프레임 이미지 (비율 기준 레이어) -->
      <img class="machine-frame" id="machineFrameImg" src="" alt="">

      <!-- 릴 3개: 각 릴은 3행 가시 영역을 가진 스트립 컨테이너 -->
      <div class="reels">
        <div class="reel" id="reel1">
          <div class="reel-strip" id="strip1"></div>
        </div>
        <div class="reel" id="reel2">
          <div class="reel-strip" id="strip2"></div>
        </div>
        <div class="reel" id="reel3">
          <div class="reel-strip" id="strip3"></div>
        </div>
      </div>

      <!-- 히트 라인: 가운데 행(판정 기준) 표시 -->
      <div class="hit-line" id="hitLine"></div>

      <!-- 결과 메시지 -->
      <div class="result-box">
        <p class="result-text" id="resultText">SPIN을 눌러보세요!</p>
      </div>

      <!-- 스핀 버튼: 머신 프레임 하단 내부 -->
      <button class="spin-btn" id="spinBtn">
        <img id="btnSpinImg" src="" alt="SPIN">
      </button>

    </div>

    <!-- 운세 카드: 3hit 당첨 시에만 표시 -->
    <div class="fortune-card" id="fortuneCard">
      <p class="fortune-card-title">✨ 오늘의 운세</p>
      <div class="fortune-luck-row">
        <span class="fortune-luck-label">행운지수</span>
        <span class="fortune-luck-value" id="luckIndex">--</span>
      </div>
      <p class="fortune-msg" id="fortuneMsg"></p>
    </div>

    <!-- 당첨 안내표 -->
    <div class="payTable">
      <h3>💰 당첨 안내</h3>
      <ul>
        <li>부적 3개 → <strong>잭팟!!!</strong></li>
        <li>황금똥 3개 / 고구마 3개 → <strong>초대박!!</strong></li>
        <li>방울 3개 / 코기 3개 / 유령 3개 → <strong>대박!</strong></li>
        <li>2개 일치 → <strong>아쉬운 당첨~</strong></li>
        <li>전부 다름 → <strong>꽝 😢</strong></li>
      </ul>
    </div>

  </div>

  <!-- 결과 팝업 오버레이: 카드 자체가 팝업 -->
  <div id="resultPopup" class="popup-overlay" aria-hidden="true" role="dialog" aria-modal="true">

    <!-- 복주머니 / 코기: 오버레이 정중앙에 독립 레이어 -->
    <div class="popup-stage" id="popupStage">
      <img id="popupStageImg" class="popup-stage-img" src="" alt="">
    </div>

    <!-- 카드 래퍼: 닫기 버튼 포함, 카드 자체가 팝업 -->
    <div class="popup-card-wrap" id="popupCardWrap">
      <!-- 닫기 버튼: 카드 우측 상단 바깥 -->
      <button class="popup-close" id="popupCloseBtn" aria-label="닫기">✕</button>

      <!-- 카드: 이미지 + 텍스트 오버레이 -->
      <div class="popup-card">
        <img class="popup-card-img" id="popupCardImg" src="" alt="카드">
        <!-- 카드 앞면 위 텍스트: flip 후 fade-in -->
        <div class="popup-card-content" id="popupCardContent">
          <span class="popup-grade-badge" id="popupGradeBadge" data-grade=""></span>
          <p class="popup-result-msg" id="popupResultMsg"></p>
          <div class="popup-luck-row">
            <span class="popup-luck-label">행운지수</span>
            <span class="popup-luck-score" id="popupLuckScore"></span>
          </div>
          <p class="popup-fortune-msg" id="popupFortuneMsg"></p>
        </div>
      </div>
    </div>

  </div>

  <!-- CSS는 main.ts에서 import -->
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
