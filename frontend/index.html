<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>똥싸개 슬롯머신</title>
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="loginScreen" class="login-screen" role="dialog" aria-modal="true" aria-label="로그인">
    <img id="loginCorgiImg" class="login-corgi-img" src="" alt="">
    <div class="login-popup">
      <img id="loginPopupBg" class="login-popup-bg-img" src="" alt="">
      <div class="login-popup-content">
        <h2 class="login-title">로그인하고 운세를 확인하세요</h2>

        <div class="login-input-wrap">
          <img class="login-input-bg-img" src="" alt="">
          <span class="login-icon login-icon-user" aria-hidden="true"></span>
          <input type="text" id="loginId" class="login-input" placeholder="아이디를 입력하세요" autocomplete="username">
        </div>

        <div class="login-input-wrap">
          <img class="login-input-bg-img" src="" alt="">
          <span class="login-icon login-icon-lock" aria-hidden="true"></span>
          <input type="password" id="loginPw" class="login-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
        </div>

        <p id="loginError" class="login-error"></p>

        <div class="login-btn-wrap">
          <img id="loginBtnImg" class="login-btn-img" src="" alt="로그인">
          <button class="login-btn" id="loginBtn" type="button" aria-label="로그인"></button>
        </div>
      </div>
    </div>
  </div>

  <!-- 게임 레이아웃: 슬롯 + 메타 사이드바 -->
  <div class="game-layout">

    <!-- 슬롯 게임 컨테이너 -->
    <div class="container">

      <h1 class="title">🎰 똥싸개 슬롯머신</h1>

      <div class="machine">
        <img class="machine-frame" id="machineFrameImg" src="" alt="">

        <div class="reels">
          <div class="reel" id="reel1"><div class="reel-strip" id="strip1"></div></div>
          <div class="reel" id="reel2"><div class="reel-strip" id="strip2"></div></div>
          <div class="reel" id="reel3"><div class="reel-strip" id="strip3"></div></div>
        </div>

        <div class="hit-line" id="hitLine"></div>

        <div class="result-box">
          <p class="result-text" id="resultText">SPIN을 눌러보세요!</p>
        </div>

        <button class="spin-btn" id="spinBtn">
          <img id="btnSpinImg" src="" alt="SPIN">
        </button>
      </div>

      <div class="fortune-card" id="fortuneCard">
        <p class="fortune-card-title">✨ 오늘의 운세</p>
        <div class="fortune-luck-row">
          <span class="fortune-luck-label">행운지수</span>
          <span class="fortune-luck-value" id="luckIndex">--</span>
        </div>
        <p class="fortune-msg" id="fortuneMsg"></p>
      </div>

    </div>

    <!-- 메타 사이드바 -->
    <aside class="meta-sidebar">
      <button class="meta-btn" id="metaBtnFortune" aria-label="포춘쿠키">
        <img class="meta-btn-img" id="metaIconFortune" src="" alt="">
        <span class="meta-btn-label">포춘쿠키</span>
      </button>
      <button class="meta-btn" id="metaBtnRanking" aria-label="랭킹">
        <img class="meta-btn-img" id="metaIconRanking" src="" alt="">
        <span class="meta-btn-label">랭킹</span>
      </button>
      <button class="meta-btn" id="metaBtnSupport" aria-label="개발자 후원하기">
        <img class="meta-btn-img" id="metaIconSupport" src="" alt="">
        <span class="meta-btn-label">후원하기</span>
      </button>

      <button class="meta-btn meta-btn--logout" id="metaBtnLogout" aria-label="로그아웃">
        <svg class="meta-logout-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </aside>

  </div>

  <!-- 당첨 안내표: game-layout 밖에 배치 → 모바일에서 메타 아래에 위치 -->
  <div class="payTable">
    <h3>💰 당첨 안내</h3>
    <ul>
      <li>부적 3개 → <strong>잭팟!!!</strong></li>
      <li>황금똥 3개 / 고구마 3개 → <strong>초대박!!</strong></li>
      <li>방울 3개 / 코기 3개 / 유령 3개 → <strong>대박!</strong></li>
      <li>2개 일치 → <strong>아쉬운 당첨~</strong></li>
      <li>전부 다름 → <strong>꽝 😢</strong></li>
    </ul>
  </div>

  <!-- 랭킹 팝업 -->
  <div class="ranking-popup-overlay" id="rankingPopupOverlay" aria-hidden="true" role="dialog" aria-modal="true" aria-label="실시간 랭킹">
    <div class="ranking-popup-card">
      <button class="ranking-popup-close" id="rankingPopupClose" aria-label="닫기">✕</button>
      <h2 class="ranking-popup-title">🏆 실시간 랭킹</h2>
      <ul class="ranking-popup-list" id="rankingPopupList">
        <li class="ranking-popup-empty">불러오는 중...</li>
      </ul>
    </div>
  </div>

  <!-- Toast -->
  <div class="meta-toast" id="metaToast"></div>

  <!-- 결과 팝업 오버레이 -->
  <div id="resultPopup" class="popup-overlay" aria-hidden="true" role="dialog" aria-modal="true">

    <div class="popup-stage" id="popupStage">
      <img id="popupStageImg" class="popup-stage-img" src="" alt="">
    </div>

    <div class="popup-card-wrap" id="popupCardWrap">
      <button class="popup-close" id="popupCloseBtn" aria-label="닫기">✕</button>
      <div class="popup-card">
        <img class="popup-card-img" id="popupCardImg" src="" alt="카드">
        <div class="popup-card-content" id="popupCardContent">
          <span class="popup-grade-badge" id="popupGradeBadge" data-grade=""></span>
          <p class="popup-result-msg" id="popupResultMsg"></p>
          <div class="popup-luck-row">
            <span class="popup-luck-label">행운지수</span>
            <span class="popup-luck-score" id="popupLuckScore"></span>
          </div>
          <p class="popup-fortune-msg" id="popupFortuneMsg"></p>
        </div>
      </div>
    </div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
